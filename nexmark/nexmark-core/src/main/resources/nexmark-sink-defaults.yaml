# Default sink DDL configurations for Nexmark queries.
# Each query has its own section with key-value pairs for connector options.
# Override these in your project's nexmark.yaml.

nexmark.sink.ddl.q0:
  connector: blackhole

nexmark.sink.ddl.q1:
  connector: blackhole

nexmark.sink.ddl.q2:
  connector: blackhole

nexmark.sink.ddl.q3:
  connector: blackhole

nexmark.sink.ddl.q4:
  connector: blackhole

nexmark.sink.ddl.q5:
  connector: blackhole

nexmark.sink.ddl.q7:
  connector: blackhole

nexmark.sink.ddl.q8:
  connector: blackhole

nexmark.sink.ddl.q9:
  connector: blackhole

nexmark.sink.ddl.q10:
  connector: filesystem
  path: file://${NEXMARK_DIR}/data/output/${SUBMIT_TIME}/bid/
  format: csv
  sink.partition-commit.trigger: partition-time
  sink.partition-commit.delay: 1 min
  sink.partition-commit.policy.kind: success-file
  partition.time-extractor.timestamp-pattern: $dt $hm:00
  sink.rolling-policy.rollover-interval: 1min
  sink.rolling-policy.check-interval: 1min

nexmark.sink.ddl.q11:
  connector: blackhole

nexmark.sink.ddl.q12:
  connector: blackhole

