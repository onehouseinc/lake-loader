# Kind cluster configuration for Nexmark benchmarking
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nexmark
nodes:
  - role: control-plane
    # Expose port for Flink UI
    extraPortMappings:
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
  - role: worker
  - role: worker
