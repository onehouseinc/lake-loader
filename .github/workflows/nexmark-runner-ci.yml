name: Nexmark Runner CI

on:
  push:
    branches: [main]
    paths:
      - 'nexmark-runner/**'
      - '.github/workflows/nexmark-runner-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'nexmark-runner/**'
      - '.github/workflows/nexmark-runner-ci.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-hudi-gcs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        flink_version: ["1.18.1"]
        hudi_version: ["1.1.1"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nexmark-runner/docker/Dockerfile
          # push: ${{ github.event_name == 'push' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-flink${{ matrix.flink_version }}-hudi${{ matrix.hudi_version }}-gcs
          build-args: |
            FLINK_VERSION=${{ matrix.flink_version }}
            NEXMARK_CONFIG_FILE=nexmark-hudi-gcs.yaml
            HUDI_VERSION=${{ matrix.hudi_version }}
          cache-from: type=gha,scope=hudi-gcs-flink${{ matrix.flink_version }}-hudi${{ matrix.hudi_version }}
          cache-to: type=gha,mode=max,scope=hudi-gcs-flink${{ matrix.flink_version }}-hudi${{ matrix.hudi_version }}
